version: "3.8"

services:
  backend:
    build:
      context: ./server
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file:
      - .env.production
    environment:
      NODE_ENV: production
      PORT: 5000
      # Provide DATABASE_URL via env or CI secret (for example, a Supabase connection string).
      DATABASE_URL: ${DATABASE_URL}
      # Provide APP_URL and BACKEND_URL via env / secrets; avoid committing defaults with secrets.
      APP_URL: ${APP_URL}
      BACKEND_URL: ${BACKEND_URL}
      BACKEND_DEV_URL: ${BACKEND_DEV_URL:-https://visitmi.irayva.ai}
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS:-${APP_URL:-https://visitmi.irayva.ai}}
    expose:
      - "5000"
    ports:
      - "127.0.0.1:8003:5000"
    networks:
      - app-network
    healthcheck:
      test: [ "CMD-SHELL", "node --input-type=module -e \"const res = await fetch('http://127.0.0.1:5000/health'); if (!res.ok) process.exit(1);\"" ]
      interval: 15s
      timeout: 5s
      retries: 10

  frontend:
    build:
      context: ./client
      dockerfile: Dockerfile
      args:
        # Frontend build-time URLs can be provided via env or CI; fallback is empty so CI must set it.
        VITE_SERVER_URL: ${VITE_SERVER_URL}
        VITE_SOCKET_URL: ${VITE_SOCKET_URL}
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "127.0.0.1:3003:80"
    networks:
      - app-network
    healthcheck:
      test: [ "CMD-SHELL", "curl -fsS http://127.0.0.1/health >/dev/null" ]
      interval: 15s
      timeout: 5s
      retries: 10
  # storage service removed for now (will be added later)

networks:
  app-network:
    driver: bridge
